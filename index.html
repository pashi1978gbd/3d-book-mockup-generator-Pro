<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>3D Book Mockup Generator PRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- LEFT PANEL -->
  <aside class="panel">
    <h2>BOOK COVER</h2>
    <label class="upload-box">
      <input type="file" id="coverUpload" accept="image/*">
      <span>Upload Book Cover</span>
    </label>

    <h2>BOOK TITLE</h2>
    <input type="text" id="bookTitle" placeholder="Your Book Title">

    <h2>AUTHOR NAME</h2>
    <input type="text" id="authorName" placeholder="Author Name">

    <div class="grid-2">
      <div>
        <h2>BACKGROUND</h2>
        <select id="bgSelect">
          <option value="neutral">Neutral</option>
          <option value="dark">Dark Studio</option>
          <option value="blue">Soft Blue</option>
        </select>
      </div>

      <div>
        <h2>AUTO SPIN</h2>
        <select id="spinSelect">
          <option value="off">Off</option>
          <option value="on">On</option>
        </select>
      </div>
    </div>

    <div class="grid-2">
      <div>
        <h2>DEPTH</h2>
        <input type="range" id="depthRange" min="0.2" max="1.2" step="0.01" value="0.55">
      </div>

      <div>
        <h2>TILT</h2>
        <input type="range" id="tiltRange" min="-25" max="25" value="0">
      </div>
    </div>

    <button id="exportBtn">Export PNG</button>
  </aside>

  <!-- RIGHT PANEL -->
  <main class="stage-wrap" id="stageWrap">
    <div id="canvas-holder"></div>
    <div class="hint">Drag to rotate • Scroll to zoom</div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="script.js"></script>
</body>
</html>
